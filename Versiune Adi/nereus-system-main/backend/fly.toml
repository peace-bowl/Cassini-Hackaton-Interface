app = "nereus-system"
primary_region = "fra"   # Frankfurt — lowest latency for Romania

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  NEREUS_OFFLINE_MODE = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "nereus_data"
  destination = "/app/data"
